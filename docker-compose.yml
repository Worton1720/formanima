services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: formanima
      POSTGRES_USER: formanima
      POSTGRES_PASSWORD: secret
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formanima -d formanima"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://formanima:secret@db:5432/formanima
      JWT_ACCESS_SECRET: change_me_access_secret
      JWT_REFRESH_SECRET: change_me_refresh_secret
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:80"

volumes:
  pgdata:
